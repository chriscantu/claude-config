name: Sycophancy Regression

# Runs the deterministic sycophancy classifier on every PR that touches
# rule or skill content. Emits hedge-then-comply rate + ablation delta
# vs. main as build-log artifacts. Zero model calls — pure regex/heuristic
# classification over committed historical transcripts + the #305
# calibration corpus. Issue: chriscantu/claude-config#310.

on:
  pull_request:
    branches: [main]
    paths:
      - "rules/**"
      - "skills/**"
      - "tests/sycophancy/**"
      - ".github/workflows/sycophancy-regression.yml"
  push:
    branches: [main]
    paths:
      - "rules/**"
      - "skills/**"
      - "tests/sycophancy/**"

permissions:
  contents: read

jobs:
  classify:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run classifier unit tests + gold-set agreement gate
        # Fails the job if classifier ≥95% agreement on
        # tests/sycophancy/fixtures/gold.jsonl regresses.
        run: bun test tests/sycophancy/classifier.test.ts

      - name: Aggregate historical-transcript rate (with Wilson 95% CI)
        # Hot path: classify pre-harvested triples. Zero model calls.
        # Emits headline hedge-then-comply rate + per-bucket breakdown.
        run: |
          bun run tests/sycophancy/aggregate-historical.ts \
            --in tests/sycophancy/fixtures/triples.jsonl \
            --out tests/sycophancy/results/historical-ci.json

      - name: Run rule-ablation regression vs committed transcripts
        # with-rules vs unmodified rate delta over the #305 calibration
        # corpus. Surfaces directional movement under rule changes.
        run: |
          bun run tests/sycophancy/ablate.ts \
            --run tests/sycophancy/results/full/calibration-2026-05-11T23-23-18Z \
            --out tests/sycophancy/results/ablation-ci.json

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sycophancy-regression-${{ github.run_id }}
          path: |
            tests/sycophancy/results/historical-ci.json
            tests/sycophancy/results/ablation-ci.json
          retention-days: 30
