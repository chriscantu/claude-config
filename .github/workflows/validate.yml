name: Validate Config

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install fish shell
        # Use Ubuntu universe (fish 3.3+ on 22.04) instead of the upstream
        # PPA. The PPA fetch via launchpad.net is a single-origin failure
        # mode for CI — confirmed by a Launchpad-unreachable incident on
        # 2026-05-01 that stalled this job indefinitely. Universe is
        # mirrored, cached on Actions runners, and ships a fish version
        # sufficient for everything this repo uses (no post-3.3 features).
        run: |
          sudo apt-get update
          sudo apt-get install -y fish
          fish --version

      - name: Install symlinks via bin/link-config.fish
        # Single source of truth for the managed-symlink layout —
        # bin/lib/symlinks.fish. Avoids a third inline encoding of the
        # layout (the prior mock-symlink shell loop diverged from
        # link-config.fish + validate.fish, silently dropping commands/
        # and hooks/ until validate.fish gained uniform coverage).
        run: fish bin/link-config.fish --install

      - name: Verify install via --check
        # Defense-in-depth: --install reports its own errors, but a silent
        # zero-iteration install (e.g. lib early-return on bad args) would
        # exit 0 with nothing linked. --check fails loudly in that case.
        run: fish bin/link-config.fish --check

      - name: Run validation (phases 1-2)
        run: fish validate.fish

      - name: Run fish-shell regression tests
        # Driver auto-discovers tests/*-test.fish and tests/validate-phase-*.fish.
        # Failure of any test file fails the run. See tests/README.md for the
        # naming contract.
        run: fish tests/run-fish-tests.fish

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript regression tests
        # Auto-discovers tests/*.test.ts. Subprocess-style regression tests
        # (those that shell out to fish via spawnSync) live here; pure
        # in-process fish lib tests stay in tests/*-test.fish. See
        # tests/README.md for the dual-track convention.
        run: bun test tests/
