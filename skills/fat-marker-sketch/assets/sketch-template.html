<!--
  Fat marker sketch HTML template.
  Duplicate the screen div for each step in the journey.
  Fill in screen names, region descriptions, and bracketed actions.
  Use ASCII-safe characters only: -> for arrows, [x] for checked, [ ] for unchecked.
  Vary the border-radius values (1px-5px) on each box for a hand-drawn feel.
-->
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
<div style="background:#fff;color:#000;font-family:'Permanent Marker',cursive;padding:30px;font-size:14px">

  <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px">

    <div style="border:4px solid #000;padding:16px;min-width:190px;max-width:250px;border-radius:2px 5px 4px 3px">
      <div style="font-size:16px;margin-bottom:8px">1. SCREEN NAME</div>
      <div style="border:3px solid #000;padding:6px;margin:8px 0;border-radius:3px 1px 4px 2px">Region description</div>
      <div style="border:3px solid #000;padding:6px;margin:8px 0;border-radius:1px 3px 2px 4px">Another region</div>
      <div style="margin-top:10px">[Action]</div>
    </div>

    <div style="border:4px solid #000;padding:16px;min-width:190px;max-width:250px;border-radius:4px 2px 5px 3px">
      <div style="font-size:16px;margin-bottom:8px">2. NEXT SCREEN</div>
      <div style="border:3px solid #000;padding:6px;margin:8px 0;border-radius:2px 4px 1px 3px">Region description</div>
      <div style="margin-top:10px">[Action]</div>
    </div>

  </div>

</div>
